apiVersion: v1
kind: Secret
metadata:
  # ========== SECRET METADATASı ==========
  # Secret, hassas bilgileri (password, API key, certificate vb) depolar
  # ConfigMap'ın aksine, Secret'lar base64 ile encode edilir (şifrelenmiş DEĞİL!)
  # Production'da encryption devre dışı bırakılabilir, o yüzden RBAC ve network policies kullan
  name: app-secrets
  
  labels:
    app: app

# type: Secret'ın türünü belirtir
type: Opaque  # Genel amaçlı secret (default)
# Diğer türler:
# - kubernetes.io/basic-auth: Username + Password
# - kubernetes.io/ssh-auth: SSH key
# - kubernetes.io/tls: TLS sertifikası
# - kubernetes.io/dockercfg: Docker config
# - kubernetes.io/service-account-token: Token

data:
  # ========== SECRET VERİLERİ ==========
  # Değerler BASE64 ile encode edilmiştir
  # Komut satırı şifreleme: echo -n "value" | base64
  # Komut satırı şifre çözme: echo "encoded" | base64 -d
  
  # Database password şifreli (base64)
  # Gerçek değer: "mySecurePassword123"
  db-password: bXlTZWN1cmVQYXNzd29yZDEyMw==
  
  # API key şifreli
  # Gerçek değer: "sk-1234567890abcdef"
  api-key: c2stMTIzNDU2Nzg5MGFiY2RlZg==
  
  # JWT secret
  jwt-secret: bXlKV1RzZWNyZXRLZXkyMDI0
  
  # İki satırlı dosya içeriği (credentials, config file vb)
  .dockerconfigjson: |
    eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3N3b3JkIn19fQ==

# stringData: Base64 encode etmek istemiyorsan plaintext yazabilirsin
# Kubernetes otomatik olarak encode eder
stringData:
  # Gerçek değer: "mySecurePassword456"
  redis-password: "mySecurePassword456"
  
  # Sertifika örneği
  tls-cert: |
    -----BEGIN CERTIFICATE-----
    MIIDXTCCAkWgAwIBAgIJAJC1/iNAZwqDMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
    ...sertifika içeriği...
    -----END CERTIFICATE-----

# ========== SECRET KULLANIM ÖRNEKLERI ==========
# 
# 1. Ortam değişkeni olarak kullanım (Deployment'da):
# env:
# - name: DATABASE_PASSWORD
#   valueFrom:
#     secretKeyRef:
#       name: app-secrets
#       key: db-password
#
# 2. Dosya olarak mount etme:
# volumeMounts:
# - name: secrets-volume
#   mountPath: /app/secrets
#   readOnly: true
# volumes:
# - name: secrets-volume
#   secret:
#     secretName: app-secrets
#     defaultMode: 0400  # Sadece owner okuyabilir
#
# 3. Image pull credentials (Docker registry password):
# imagePullSecrets:
# - name: docker-registry-secret
#
# ========== GÜVENLİK NOTLARI ==========
# 
# ⚠️  Secret'lar base64 encoded'dir, ŞİFRELENMEMİŞTİR!
#     Herkes base64'ü decode edebilir. Gerçek güvenlik için:
#     - etcd encryption'ı etkinleştir
#     - RBAC kuralları koy (kim secret'ı görebilir)
#     - Network policies koy
#     - Secret'lar Git'e commit etme! (sealed-secrets veya external-secrets kullan)
#
# ✅  En iyi pratikler:
#     - Production'da external secret management kullan (Vault, Sealed Secrets)
#     - Secret'ları pod log'larında leak etme
#     - Secret'ları uygun RBAC ile koruma
#
# Değişkenleri base64'lemek için:
# echo -n "mypassword" | base64
# mypassword'ü yaz, Ctrl-D
# Sonuc: bXlwYXNzd29yZA==
