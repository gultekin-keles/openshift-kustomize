apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: app-base

# ========== KAYNAKLAR ==========
# Bu base'de kullanılacak tüm Kubernetes YAML dosyaları
resources:
- deployment.yaml
- service.yaml
- route.yaml
- configmap.yaml
- secret.yaml

# ========== ORTAK LABELLERİ ==========
# Tüm kaynakların başına otomatik bu labelları ekle
labels:
- pairs:
    app: app
