apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: webserver
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx
        app.kubernetes.io/name: nginx
        app.kubernetes.io/component: webserver
    spec:
      containers:
      - name: nginx
        image: registry.redhat.io/rhel8/nginx-120:latest
        ports:
        - containerPort: 8080  # RHEL Nginx imajları varsayılan olarak 8080 portunu dinler
          name: http
        env:
        - name: NGINX_CONTAINER_RUN_AS
          value: nginx
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        # /opt/app-root/src/ yerine doğrudan Nginx'in ham HTML dizinini hedefliyoruz:
        # Bu sayede S2I başlangıç betiğini bypass eder ve pod kapatılmaz.
        - name: html-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: index-html
          defaultMode: 420