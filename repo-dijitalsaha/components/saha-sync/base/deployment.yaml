apiVersion: apps/v1
kind: Deployment
metadata:
  # 1. Saha-sync senkronizasyon servisi deployment
  name: saha-sync
  labels:
    app: saha-sync
    app.kubernetes.io/component: saha-sync
    app.kubernetes.io/name: saha-sync
    app.openshift.io/runtime: java
spec:
  # 2. Senkronizasyon servisi için 2 replika
  replicas: 2
  selector:
    matchLabels:
      app: saha-sync
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: saha-sync
    spec:
      containers:
      - name: saha-sync
        image: image-registry.openshift-image-registry.svc:5000/dijitalsaha/saha-sync:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
          name: http
        - containerPort: 8443
          protocol: TCP
          name: https
        - containerPort: 8778
          protocol: TCP
          name: jolokia
        env:
        - name: JAVA_APP_JAR
          value: saha-sync-0.0.1-SNAPSHOT.war
        - name: JAVA_OPTS_APPEND
          value: -Dspring.profiles.active=test -Djava.awt.headless=true -Dsun.java2d.cmm=sun.java2d.cmm.kcms.KcmsServiceProvider
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
