apiVersion: apps/v1
kind: Deployment
metadata:
  # 1. Saha-web web arayüzü deployment
  name: saha-web
  labels:
    app: saha-web
    app.kubernetes.io/component: saha-web
    app.kubernetes.io/name: saha-web
    app.openshift.io/runtime: java
spec:
  # 2. Web frontend için tek replika
  replicas: 1
  selector:
    matchLabels:
      app: saha-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: saha-web
    spec:
      containers:
      - name: saha-web
        image: image-registry.openshift-image-registry.svc:5000/dijitalsaha/saha-web-openshift:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
          name: http
        - containerPort: 8443
          protocol: TCP
          name: https
        - containerPort: 8778
          protocol: TCP
          name: jolokia
        env:
        - name: JAVA_APP_JAR
          value: saha-web.war
        - name: JAVA_OPTS_APPEND
          value: -Dspring.profiles.active=test -Djava.awt.headless=true -Dsun.java2d.cmm=sun.java2d.cmm.kcms.KcmsServiceProvider
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
