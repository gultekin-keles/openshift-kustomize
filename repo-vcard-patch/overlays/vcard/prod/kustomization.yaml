apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: vcard-prod

resources:
- ../../../components/vcard/base

replicas:
- name: vcard
  count: 3

labels:
- includeSelectors: true
  pairs:
    environment: prod
    cluster: prod-cluster

images:
- name: image-registry.openshift-image-registry.svc:5000/vcard/vcard
  newName: prod-registry.openshift-image-registry.svc:5000/vcard/vcard
  newTag: v1.0

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: vcard
  path: deployment-patch.yaml
