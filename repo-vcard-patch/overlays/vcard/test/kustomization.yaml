apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: vcard-test

resources:
- ../../../components/vcard/base

namePrefix: test-
nameSuffix: -test

replicas:
- name: vcard
  count: 1

labels:
- includeSelectors: true
  pairs:
    environment: test
    cluster: test-cluster

images:
- name: image-registry.openshift-image-registry.svc:5000/vcard/vcard
  newName: test-registry.openshift-image-registry.svc:5000/vcard/vcard
  newTag: v1.0-test

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: vcard
  path: deployment-patch.yaml
