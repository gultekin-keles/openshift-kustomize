apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. Test overlay, geliştirme ve hızlı doğrulama için kullanılır.
resources:
- ../../../components/service-a/base
- ../../../components/service-b/base
- ../../../components/service-c/base
- ../../../components/worker/base
- ../../../components/database/base
- ../../../components/cronjob/base

# 2. İsim öneki/soneki, test kaynaklarının diğer ortamlardan ayrılmasını sağlar.
namePrefix: test-
nameSuffix: -test

# 3. Test ortamında daha az replica çalıştırmak yaygındır.
replicas:
- name: service-a
  count: 1
- name: service-b
  count: 1

# 4. Etiketler, bu overlay çıktısını kolayca tanımlamayı sağlar.
labels:
- includeSelectors: true
  pairs:
    environment: test
    scenario: simple
