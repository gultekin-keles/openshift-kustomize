apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../components/web/base
- ../../../components/api/base
- ../../../components/db/base

replicas:
- name: web
  count: 3
- name: api
  count: 3

labels:
- includeSelectors: true
  pairs:
    environment: prod
    tier: production

patchesStrategicMerge:
- patches/secure-route.yaml
- patches/db-pvc-size.yaml
