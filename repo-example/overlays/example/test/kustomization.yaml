apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../components/web/base
- ../../../components/api/base
- ../../../components/db/base

namePrefix: test-
nameSuffix: -test

replicas:
- name: web
  count: 1
- name: api
  count: 1

labels:
- includeSelectors: true
  pairs:
    environment: test
    tier: frontend
