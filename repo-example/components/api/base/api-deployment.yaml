apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: repo-example
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: repo-example
      component: api
  template:
    metadata:
      labels:
        app: repo-example
        component: api
    spec:
      containers:
      - name: api
        image: registry.example.com/repo-example/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: database-url
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: repo-example
    component: api
spec:
  selector:
    app: repo-example
    component: api
  ports:
  - port: 8080
    targetPort: http
    name: http
    protocol: TCP
  type: ClusterIP
