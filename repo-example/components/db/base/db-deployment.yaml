apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: repo-example
    app.kubernetes.io/name: db
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repo-example
      component: db
  template:
    metadata:
      labels:
        app: repo-example
        component: db
    spec:
      containers:
      - name: db
        image: registry.example.com/repo-example/db:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: "repo-example"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: database-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: database-password
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        readinessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    app: repo-example
    component: db
spec:
  selector:
    app: repo-example
    component: db
  ports:
  - port: 5432
    targetPort: postgres
    name: postgres
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
