apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: repo-example
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: repo-example
      component: web
  template:
    metadata:
      labels:
        app: repo-example
        component: web
    spec:
      containers:
      - name: web
        image: registry.example.com/repo-example/web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: API_URL
          value: "http://api.repo-example.svc.cluster.local"
        - name: LOG_LEVEL
          value: "debug"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: repo-example
    component: web
spec:
  selector:
    app: repo-example
    component: web
  ports:
  - port: 80
    targetPort: http
    name: http
    protocol: TCP
  type: ClusterIP
